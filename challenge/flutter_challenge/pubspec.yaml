name: flutter_challenge
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.13.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_svg: ^0.22.0
  graphql_flutter: ^5.0.0
  get: ^4.1.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  pedantic: ^1.11.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/svgs/
    - lib/assets/images/

  fonts:
    - family: Proxima Nova
      fonts:
        - asset: lib/assets/fonts/ProximaNova-Light.otf
          weight: 300
        - asset: lib/assets/fonts/ProximaNova-Regular.ttf
          weight: 400
        - asset: lib/assets/fonts/ProximaNova-SemiBold.otf
          weight: 600
        - asset: lib/assets/fonts/ProximaNova-Bold.ttf
          weight: 700
        - asset: lib/assets/fonts/ProximaNova-Regular-It.ttf
          style: italic

